<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Curvas Paramétricas</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .canvas-container {
            position: relative;
            width: 700px;
            margin: 30px auto;
            background: white;
            border: 1px solid #ccc;
        }

        canvas {
            display: block;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        .stat {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="canvas-container">
    <canvas id="paramCanvas" width="700" height="450"></canvas>
    
    <div class="hud">
        <div>Parámetro t: <span id="stat-t" class="stat">0.00</span></div>
        <div>Dirección: <span id="stat-dir" class="stat">0°</span></div>
        <div>Velocidad: <span id="stat-speed" class="stat">0.00</span></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('paramCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiT = document.getElementById('stat-t');
    const uiDir = document.getElementById('stat-dir');
    const uiSpeed = document.getElementById('stat-speed');

    let t = 0;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Centro
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Parámetros de la curva
        const A = 250, B = 150;
        const a = 1, b = 2;

        // POSICIÓN (curva paramétrica)
        const x = cx + A * Math.cos(a * t);
        const y = cy + B * Math.sin(b * t);

        // VELOCIDAD (derivada)
        const vx = -A * a * Math.sin(a * t);
        const vy = B * b * Math.cos(b * t);

        // Magnitud y dirección
        const speed = Math.sqrt(vx*vx + vy*vy);
        const angle = Math.atan2(vy, vx) * (180 / Math.PI);

        // Dibujar trayectoria completa
        ctx.beginPath();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;

        for(let i = 0; i < 6.28; i += 0.01) {
            let tx = cx + A * Math.cos(a * i);
            let ty = cy + B * Math.sin(b * i);

            if(i === 0) ctx.moveTo(tx, ty);
            else ctx.lineTo(tx, ty);
        }
        ctx.stroke();

        // Dibujar vector velocidad (flecha)
        drawArrow(ctx, x, y, x + vx * 0.4, y + vy * 0.4, '#3498db');

        // Dibujar punto en movimiento
        ctx.beginPath();
        ctx.fillStyle = '#000';
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fill();

        // Mostrar datos
        uiT.innerText = t.toFixed(2);
        uiDir.innerText = Math.floor(angle) + "°";
        uiSpeed.innerText = (speed * 0.01).toFixed(2);

        // Avanza el parámetro
        t += 0.01;
        if (t > 6.28) t = 0;

        requestAnimationFrame(draw);
    }

    function drawArrow(ctx, fromX, fromY, toX, toY, color) {
        const headLength = 10;
        const angle = Math.atan2(toY - fromY, toX - fromX);

        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;

        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);

        ctx.lineTo(
            toX - headLength * Math.cos(angle - Math.PI/6),
            toY - headLength * Math.sin(angle - Math.PI/6)
        );

        ctx.moveTo(toX, toY);
        ctx.lineTo(
            toX - headLength * Math.cos(angle + Math.PI/6),
            toY - headLength * Math.sin(angle + Math.PI/6)
        );

        ctx.stroke();
    }

    draw();
</script>

</body>
</html>
