<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Transformaciones 3D</title>
<link rel="stylesheet" href="estilos.css">
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.85);
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="info">
    <b>Practica 3:</b><br>
    <b>Controles:</b><br>
    Flechas → Mover<br>
    A / E → Rotar<br>
    S / D → Escalar
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x20552a);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// cubo
const geometry = new THREE.BoxGeometry(1,1,1);
const material= [
    new THREE.MeshBasicMaterial({ color: 0xff0000 }), // lado 1
    new THREE.MeshBasicMaterial({ color: 0x00ff00 }), // lado 2
    new THREE.MeshBasicMaterial({ color: 0x0000ff }), // lado 3
    new THREE.MeshBasicMaterial({ color: 0xffff00 }), // lado 4
    new THREE.MeshBasicMaterial({ color: 0xff00ff }), // arriba
    new THREE.MeshBasicMaterial({ color: 0x00ffff })  // abajo
];
const cubo = new THREE.Mesh(geometry, material);
scene.add(cubo);

// luz
const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z = 5;

// controles
window.addEventListener('keydown', (event)=>{
    switch(event.key){

        // TRASLACIÓN
        case 'ArrowUp': cubo.position.y += 0.2; break;
        case 'ArrowDown': cubo.position.y -= 0.2; break;
        case 'ArrowLeft': cubo.position.x -= 0.2; break;
        case 'ArrowRight': cubo.position.x += 0.2; break;

        // ROTACIÓN
        case 'a':
        case 'A': cubo.rotation.y -= 0.1; break;

        case 'e':
        case 'E': cubo.rotation.y += 0.1; break;

        // ESCALADO
        case 's':
        case 'S':
            cubo.scale.x += 0.1;
            cubo.scale.y += 0.1;
            cubo.scale.z += 0.1;
            break;

        case 'd':
        case 'D':
            cubo.scale.x = Math.max(0.2, cubo.scale.x - 0.1);
            cubo.scale.y = Math.max(0.2, cubo.scale.y - 0.1);
            cubo.scale.z = Math.max(0.2, cubo.scale.z - 0.1);
            break;
    }
});

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// responsive
window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
