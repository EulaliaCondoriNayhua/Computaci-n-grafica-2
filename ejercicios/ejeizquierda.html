<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parábola hacia la izquierda</title>
</head>
<body>

<canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

<script>
  const canvas = document.getElementById('myCanvas');
  const ctx = canvas.getContext('2d');

  // --- DIBUJAR LOS EJES ---
  ctx.beginPath();
  ctx.moveTo(0, 250); // eje X
  ctx.lineTo(500, 250);
  ctx.moveTo(250, 0); // eje Y
  ctx.lineTo(250, 500);
  ctx.strokeStyle = 'black';
  ctx.stroke();

  // --- PARÁBOLA HACIA LA IZQUIERDA ---
  ctx.beginPath();

  for (var y = -250; y < 250; y++) {
    var x = -Math.pow(y, 2) / 100; // ← negativa = izquierda
    ctx.lineTo(250 + x, 250 - y);
  }

  ctx.strokeStyle = 'blue';
  ctx.stroke();
</script>

</body>
</html>
