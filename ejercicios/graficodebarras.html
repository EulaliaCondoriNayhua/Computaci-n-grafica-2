<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafico de barras</title>
</head>
<body>
    <h2>Gráfico de Barras</h2>

    <h2>Realizado por Eulalia Condori Nayhua</h2>

    <!-- AREA DE DIBUJO -->
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // Datos
        var valores = [50, 60, 70, 90, 100];2
        var colores = ["red", "blue", "green", "orange", "purple"];

        var x = 50; // posición inicial en X
        var ancho = 50;

        for (var i = 0; i < valores.length; i++) {

            var altura = valores[i] * 3; // escala para que se vea grande
            var y = 450 - altura;

            // Dibujar barra
            ctx.beginPath();
            ctx.fillStyle = colores[i];
            ctx.fillRect(x, y, ancho, altura);
            ctx.strokeRect(x, y, ancho, altura);

            // Escribir porcentaje arriba
            ctx.fillStyle = "red";
            ctx.font = "16px Arial";
            ctx.fillText(valores[i] + "%", x + 5, y - 5);

            x += 70; // separación entre barras
        }
    </script>

</body>
</html>
